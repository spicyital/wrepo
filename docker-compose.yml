name: wrepo

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wrepo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wrepo}
      POSTGRES_DB: ${POSTGRES_DB:-wrepo}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wrepo} -d ${POSTGRES_DB:-wrepo}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-wrepo}:${POSTGRES_PASSWORD:-wrepo}@db:5432/${POSTGRES_DB:-wrepo}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://wrepo.org}
      NEXTAUTH_URL_INTERNAL: ${NEXTAUTH_URL_INTERNAL:-http://web:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-change-me-for-local-docker}
      APP_URL: ${APP_URL:-https://wrepo.org}
      APP_NAME: ${APP_NAME:-WRepo}
      APP_DESCRIPTION: ${APP_DESCRIPTION:-A self-hosted academic paper repository}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: /app/storage
      SEARCH_DRIVER: postgres
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-WRepo Administrator}
      ADMIN_BOOTSTRAP: ${ADMIN_BOOTSTRAP:-0}
    volumes:
      - ${STORAGE_HOST_PATH:-./storage}:/app/storage
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - --loglevel
      - ${CLOUDFLARE_TUNNEL_LOGLEVEL:-info}
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:-}
    read_only: true
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  db_data:
