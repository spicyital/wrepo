# Optional direct-origin Nginx config for WRepo.
# Recommended production deployment uses Cloudflare Tunnel instead, so the
# origin does not need inbound ports 80/443 at all. Keep this file as a simple
# fallback for a future VPS or direct-origin setup.

server {
    listen 80;
    listen [::]:80;
    server_name wrepo.net www.wrepo.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wrepo.net www.wrepo.net;

    ssl_certificate     /etc/letsencrypt/live/wrepo.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wrepo.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_tokens off;
    client_max_body_size 30m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/rss+xml;
    gzip_min_length 1024;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        # Overwrite forwarded IP headers so the app never sees client-supplied chains.
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header CF-Connecting-IP  $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
